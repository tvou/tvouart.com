<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TVOU</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="https://64.media.tumblr.com/d6bcc6387393101cf51cb48732d65147/48526192b0a20519-f0/s75x75_c1/1fc3d9244402a25baf6a2a2e1e5da03f540c209d.pnj">

  <!-- Lightbox -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.css" />

  <style>
    body {
      margin: 0;
      background: white;
      color: black;
      font-family: "Eina 09", sans-serif;
      font-size: 1.2rem;
      overflow-x: hidden;
    }

    #content h1 {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      padding: 10px 0;
      text-align: center;
      z-index: 9999;
      margin: 0;
      font-weight: bold;
      font-size: 1.8rem;
      letter-spacing: .10em;
    }

    h2, p {
      margin-left: 20px;
      margin-right: 20px;
    }

    #hero {
      width: 100%;
      height: 50vh;
      overflow: hidden;
    }

    #hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    nav#bottomMenu {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      display: flex;
      z-index: 9999;
    }

    nav#bottomMenu a {
      flex: 1;
      text-align: center;
      color: black;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: .10em;
      padding: 10px 0;
      border-left: 1px solid black;
      transition: 0.3s;
    }

    nav#bottomMenu a:first-child {
      border-left: none;
    }

    nav#bottomMenu a:hover {
      background-color: black;
      color: white;
    }

    .container {
      width: 100%;
      padding: 50px 5%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      box-sizing: border-box;
    }

    .gallery {
      column-count: 4;
      column-gap: 2rem;
    }

    @media (max-width: 1024px) {
      .gallery { column-count: 3; }
    }

    @media (max-width: 768px) {
      .gallery { column-count: 2; }
    }

    @media (max-width: 480px) {
      .gallery { column-count: 1; }
    }

    .gallery a {
      display: inline-block;
      width: 100%;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .gallery img {
      width: 100%;
      display: block;
      transition: opacity 0.5s;
    }

    .gallery img:hover {
      opacity: 0.5;
      cursor: zoom-in;
    }

    .caption {
      opacity: 0;
      position: absolute;
      top: 0;
      left: 0;
      background: rgba(250,235,215,0.7);
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }

    .caption p {
      text-align: center;
      padding: 1.5rem;
    }

    .gallery a:hover .caption {
      opacity: 1;
    }
  </style>
</head>

<body>

<div id="content">
  <h1>TVOU</h1>
</div>

<div id="hero">
  <img src="https://static.tumblr.com/zpixtn5/rEdt5swu2/pop1.jpg" alt="Hero Image">
</div>

<nav id="bottomMenu">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="voyages.html">Voyages</a>
  <a href="contact.html">Contact</a>
</nav>

<h2>Artwork</h2>
<p>Click on images to enlarge</p>

      <div class="caption"><p>Celestial Navigation</p></div>

    <!-- (rest of your images stay unchanged) -->

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox-plus-jquery.js"></script>

</body>
</html>

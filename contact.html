<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TVOU</title>
  <style>
    body {
      margin: 0;
      background: white;
      color: black;
      font-family: "Eina 09", sans-serif;
      font-size: 1.2rem;
      overflow-x: hidden;
    }

    #content h1 {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: white;
      padding: 10px 0;
      text-align: center;
      z-index: 9999;
      margin: 0;
      font-weight: bold;
      font-size: 1.8rem;
      letter-spacing: .10em;
    }

    #hero {
      width: 100%;
      height: 50vh;
      overflow: hidden;
      position: relative;
    }

    #hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: bottom;
      display: block;
    }

    nav#bottomMenu {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 9999;
    }

    nav#bottomMenu a {
      flex: 1;
      text-align: center;
      color: black;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: .10em;
      padding: 10px 0;
      transition: background-color 0.3s ease, color 0.3s ease;
      border-left: 1px solid black;
    }

    nav#bottomMenu a:first-child {
      border-left: none;
    }

    nav#bottomMenu a:hover {
      background-color: black;
      color: white;
    }

    .container {
      width: 100%;
      padding: 50px 5%;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .about {
      max-width: 800px;
      margin: 0 auto;
      text-align: left;
      line-height: 1.6;
    }

    .about h2 {
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
    }

    .about p {
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<div id="content">
  <h1>TVOU</h1>
</div>

<div id="hero">
  <img src="https://64.media.tumblr.com/06707fc3efdd56c4d83e57dcd599bd5b/623ed3c28b2e8a8f-4f/s1280x1920/6e96b68a1169517b567e3c61f8abbf4e50dce1e3.jpg" alt="Hero image">
</div>

<nav id="bottomMenu">
  <a href="https://tvouart.tumblr.com/">Home</a>
  <a href="https://tvouart.tumblr.com/about">About</a>
  <a href="https://tvouart.tumblr.com/voyages">Voyages</a>
  <a href="https://tvouart.tumblr.com/contact">Contact</a>
</nav>

<div class="container">
  <div class="about">
    <h2>Contact</h2>
    <p>
      Please send email:
      <p/>
      
    <p>  
      Tvou.Partners@gmail.com
     </p>
      
     
  </div>
</div>

</body>
</html>
